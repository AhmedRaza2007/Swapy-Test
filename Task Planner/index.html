<!-- <!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #f1f1f1;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #posts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card p {
      margin-bottom: 10px;
      color: gray;
    }

    .user {
      color: blue;
      margin-bottom: 10px;
      font-weight: bold;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: blue;
    }
  </style>
</head>

<body>

  <h1>Posts Application</h1>

  <div id="posts"></div>

  <script>

    let postsContainer = document.getElementById("posts");

    fetch("https://jsonplaceholder.typicode.com/posts?_limit=10")

      .then((response) => response.json())

      .then((posts) => {

        posts.forEach((post) => {

          fetch(`https://jsonplaceholder.typicode.com/users/${post.userId}`)

            .then((response) => response.json())

            .then((user) => {

              fetch(`https://jsonplaceholder.typicode.com/comments?postId=${post.id}`)

                .then((response) => response.json())

                .then((comments) => {

                  let div = document.createElement("div");

                  div.className = "card";

                  div.innerHTML = `
                
                <h3>${post.title}</h3>

                <p>${post.body.slice(0, 40)}...</p>

                <div class="user">
                  User: ${user.name}
                </div>

                <div>
                  Total Comments: ${comments.length}
                </div>

                <br>

                <a href="details.html?id=${post.id}">
                  <button>View Details</button>
                </a>

              `;

                  postsContainer.appendChild(div);

                });

            });

        });

      });

  </script>

</body>

</html> -->
